  <!-- Block Start -->

  <div class="h-screen w-full bg-black grid place-content-center text-center">
      <div class="container"><h1 class="!text-white !text-9xl tracking-tighter">{{work_header}}</h1></div>

      <a href="{{url}}">

            <img class="w-full aspect-video object-cover" src="{{ glide :src="feature_image" fit="crop_focal" }}" alt="">

        </div>
