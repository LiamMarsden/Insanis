  <!-- Block Start -->


   <div class="w-full bg-black flex justify-center py-50">
  <div class="grid grid-cols-1 md:grid-cols-2 w-full md:w-7/12 lg:w-9/12 gap-0 gap-y-0">
    {{ collection:work :limit="entries_limit" }}
      <a href="{{url}}">
        <div class="w-full aspect-video grid content-end relative transition-opacity duration-300 hover:opacity-50">
          <div class="absolute self-end p-3 z-7">
            <p class="!text-white ">{{proof}}</p>
            <h3 class="!text-white !font-black tracking-tighter">{{title}}</h3>
            <h4 class="!text-white">{{highlight}}</h4>
          </div>
          <div class="absolute w-full aspect-video z-6 object-cover bg-linear-to-tr from-black to-transparent">
          </div>
          <div class="absolute w-full aspect-video z-5">
            <img class="w-full aspect-video object-cover" src="{{ glide :src="feature_image" fit="crop_focal" }}" alt="">
          </div>
        </div>
      </a>
    {{ /collection:work }}
  </div>
</div>

  <!-- Block End -->
