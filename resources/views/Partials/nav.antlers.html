
<!-- Header Start -->
<nav class="top-0 w-full absolute z-50">
    <div class="w-full flex items-center justify-between">
        <a class="grid place-content-start ml-5 md:ml-0 md:place-content-center w-full absolute mt-30" href="/">
            <img class="xl:h-17 h-10 md:h-12" src="{{ glide :src="branding:logo_primary" fit="crop_focal" }}" alt="">
        </a>

        <!-- Mobile Button -->
            <div id="mobile-menu-toggle" class="md:hidden !text-white text-6xl pt-6 cursor-pointer absolute top-0 right-0 pr-5" type="button">
                <span id="menu-icon">☰</span>
            </div>

        <!-- Desktop Nav -->
        <div class="hidden md:flex absolute right-0 top-0 mr-20">
            <ul class="flex gap-6">
                {{ nav:nav }}
                    <li class="list-none tracking-widest transition-opacity duration-300 lg:text-3xl
                        {{ if is_homepage }}
                            opacity-100 !text-white hover:opacity-50
                        {{ elseif is_current || is_parent }}
                            opacity-100 !text-white
                        {{ else }}
                            opacity-50 !text-white hover:opacity-100
                        {{ /if }}">
                        <a class="h-20 flex items-center" href="{{ url }}">
                            {{ title }}
                        </a>
                    </li>
                {{ /nav:nav }}
            </ul>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-black h-screen grid place-items-center px-4 pt-40 pb-8">
        <ul class="space-y-6 text-center">
            {{ nav:nav }}
                <li class="tracking-widest
                    {{ if is_homepage }}
                        opacity-100 !text-white
                    {{ elseif is_current || is_parent }}
                        opacity-100 !text-white
                    {{ else }}
                        opacity-50 !text-white
                    {{ /if }}">
                    <a class="block text-6xl" href="{{ url }}">
                        {{ title }}
                    </a>
                </li>
            {{ /nav:nav }}
        </ul>
    </div>
</nav>
<!-- Header End -->
