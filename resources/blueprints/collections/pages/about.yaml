title: About
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
      -
        display: Content
        fields:
          -
            handle: about_text_field
            field:
              type: replicator
              display: Content
              sets:
                new_set_group:
                  display: 'New Set Group'
                  sets:
                    new_set:
                      display: 'New Set'
                      fields:
                        -
                          handle: about_text
                          field:
                            buttons:
                              - h1
                              - h2
                              - h3
                              - h4
                              - bold
                              - italic
                              - alignleft
                              - aligncenter
                              - alignright
                              - unorderedlist
                              - orderedlist
                              - removeformat
                              - quote
                              - anchor
                              - image
                              - table
                            remove_empty_nodes: false
                            type: bard
                            display: about_text
                        -
                          handle: bg_colour
                          field:
                            type: toggle
                            display: BG-Colour
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: parent
            field:
              type: entries
              collections:
                - pages
              max_items: 1
              listable: false
              localizable: true
sets:
  image_block:
    display: Image
    fields:
      -
        handle: image
        field:
          type: assets
          container: assets
          max_files: 1
          allow_uploads: true
          restrict: true
          display: Image
      -
        handle: alt
        field:
          type: text
          display: 'Alt text'
      -
        handle: caption
        field:
          type: textarea
          display: Caption
          antlers: false
          rows: 2
      -
        handle: ratio
        field:
          type: select
          display: 'Aspect Ratio'
          options:
            auto: Auto
            1-1: '1:1'
            4-3: '4:3'
            16-9: '16:9'
            3-2: '3:2'
          default: auto
      -
        handle: size
        field:
          type: select
          display: 'Display Size'
          options:
            full: 'Full width'
            large: Large
            medium: Medium
            small: Small
          default: large
      -
        handle: align
        field:
          type: button_group
          display: Alignment
          options:
            left: Left
            center: Center
            right: Right
          default: center
      -
        handle: crop
        field:
          type: toggle
          display: 'Crop to fit ratio?'
          default: true
      -
        handle: link_url
        field:
          type: text
          input_type: url
          display: 'Link (optional)'
      -
        handle: lightbox
        field:
          type: toggle
          display: 'Enable lightbox?'
          default: false
