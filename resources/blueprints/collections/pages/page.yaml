title: Content
tabs:
  main:
    display: Main
    sections:
      -
        display: 'Page Content'
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
      -
        display: 'Hero Text'
        fields:
          -
            import: textcentered
      -
        display: Cards
        fields:
          -
            import: cards
      -
        display: 'Block 1'
        fields:
          -
            import: block_1
      -
        display: workshowcase
        fields:
          -
            import: workshowcase
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: parent
            field:
              type: entries
              collections:
                - pages
              max_items: 1
              listable: false
              localizable: true
