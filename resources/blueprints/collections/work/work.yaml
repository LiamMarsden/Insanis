title: Work
tabs:
  main:
    display: Main
    sections:
      -
        display: 'Homepage Content'
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: feature_image
            field:
              max_files: 1
              container: assets
              type: assets
              display: 'Feature Image'
          -
            handle: proof
            field:
              type: text
              display: Proof
          -
            handle: highlight
            field:
              type: text
              display: Highlight
      -
        display: Contents
        fields:
          -
            handle: banner_image
            field:
              max_files: 1
              container: assets
              type: assets
              display: 'Banner Image'
          -
            handle: banner_header
            field:
              type: text
              display: 'Banner Header'
          -
            handle: content_field
            field:
              type: replicator
              display: Content
              sets:
                new_set_group:
                  display: 'New Set Group'
                  sets:
                    copy:
                      display: Copy
                      icon: text-formatting-type-cursor
                      fields:
                        -
                          handle: content_header
                          field:
                            type: text
                            display: 'Content Header'
                        -
                          handle: content_copy
                          field:
                            buttons:
                              - h1
                              - h2
                              - h3
                              - bold
                              - italic
                              - alignleft
                              - aligncenter
                              - alignright
                              - unorderedlist
                              - orderedlist
                              - removeformat
                              - quote
                              - anchor
                              - image
                              - table
                              - horizontalrule
                            remove_empty_nodes: false
                            type: bard
                            display: Content
                    assets:
                      display: Assets
                      icon: media-image-picture-orientation
                      fields:
                        -
                          handle: images
                          field:
                            max_files: 1
                            container: assets
                            type: assets
                            display: Images
                        -
                          handle: video
                          field:
                            max_files: 1
                            container: assets
                            type: assets
                            display: Video
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: parent
            field:
              type: entries
              collections:
                - work
              max_items: 1
              listable: false
              localizable: true
